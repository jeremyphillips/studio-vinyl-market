name: Storybook A11y

on:
  push:
    branches:
      - feat/**
      - fix/**
      - chore/**
  pull_request:
    branches:
      - main

jobs:
  storybook-a11y:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Storybook
        run: yarn workspace @vinyl-market/web build-storybook --quiet

      - name: Upload Storybook build on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: storybook-static
          path: apps/web/storybook-static

      - name: Run Storybook a11y tests
        run: |
          npx concurrently -k -s first -n "SB,TEST" \
            "npx http-server apps/web/storybook-static --port 6006 --silent" \
            "npx wait-on http://127.0.0.1:6006 && yarn workspace @vinyl-market/web test-storybook --url http://127.0.0.1:6006"
