name: CI

on:
  push:
    branches:
      - feat/**
      - fix/**
      - chore/**
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Dead code check
        run: yarn fallow

      - name: Test
        run: yarn test

      - name: Check typegen is up to date
        # TypeGen reads the local schema only, so no Sanity project credentials
        # are required (apps/studio/sanity.project.ts falls back to placeholders
        # when SANITY_TYPEGEN is set). DEBUG surfaces the real cause if the
        # Sanity CLI config ever fails to load instead of the opaque wrapper.
        env:
          DEBUG: sanity:cli*
        run: |
          yarn workspace @vinyl-market/studio typegen
          git diff --exit-code apps/web/sanity/types.generated.ts

  build:
    needs: ci
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
      NEXT_PUBLIC_SANITY_STUDIO_URL: ${{ secrets.NEXT_PUBLIC_SANITY_STUDIO_URL }}
      SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn workspace @vinyl-market/web build
