name: Auto PR

on:
  push:
    branches:
      - feat/**
      - fix/**
      - chore/**

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pull-request:
    runs-on: ubuntu-latest

    steps:
      - name: Create pull request if missing
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '')
            const { owner, repo } = context.repo
            const base = 'main'

            const { data: existingPullRequests } = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              base,
              state: 'open',
            })

            if (existingPullRequests.length > 0) {
              core.info(`Open PR already exists for ${branch}`)
              return
            }

            const { data: pullRequest } = await github.rest.pulls.create({
              owner,
              repo,
              title: branch,
              head: `${owner}:${branch}`,
              base,
              body: [
                'Auto-opened when this branch was pushed.',
                '',
                `Branch: \`${branch}\``,
                `Commit: ${context.sha}`,
              ].join('\n'),
            })

            core.info(`Created PR #${pullRequest.number}: ${branch} → ${base}`)